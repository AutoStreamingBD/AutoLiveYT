name: YouTube Full HD 1080p Live
on:
  repository_dispatch:
    types: [start-live]

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Start Full HD Streaming (10 Min)
        run: |
          # ভিডিও সোর্স এবং ইউটিউব সার্ভার সেটআপ
          # client_payload এর মাধ্যমে ইনপুট নেওয়া হচ্ছে
          
          timeout 600s ffmpeg -re -i "YOUR_VIDEO_DIRECT_URL_HERE" \
          -c:v libx264 -preset veryfast -b:v 4500k -maxrate 4500k -bufsize 9000k \
          -pix_fmt yuv420p -s 1920x1080 -g 60 -r 30 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.client_payload.stream_key }}"
          
