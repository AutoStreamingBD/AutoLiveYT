name: Global Cloud Streamer Engine
on:
  repository_dispatch:
    types: [start-live]

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: System Turbo Charge
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: High-Level Bypass & Stream
        run: |
          # ইউটিউবের আইপি ব্লক এড়াতে একাধিক 'ইনস্ট্যান্স' থেকে লিঙ্ক খোঁজার চেষ্টা করবে
          # এটি সরাসরি ইউটিউবকে হিট না করে বিভিন্ন ওপেন সোর্স এপিআই ব্যবহার করবে
          
          ID="${{ github.event.client_payload.video_id }}"
          
          # মেকানিজম ১: ইনভিডিয়াস এপিআই ব্যবহার করে লিঙ্ক বের করা (কুকিজ লাগে না)
          VIDEO_URL=$(curl -s "https://invidious.snopyta.org/api/v1/videos/$ID" | jq -r '.formatStreams[0].url' || \
                      curl -s "https://yewtu.be/api/v1/videos/$ID" | jq -r '.formatStreams[0].url' || \
                      yt-dlp -g --extractor-args "youtube:player-client=tv,html5" "https://www.youtube.com/watch?v=$ID")

          if [ -z "$VIDEO_URL" ] || [ "$VIDEO_URL" == "null" ]; then
            echo "Failed to bypass YouTube detection."
            exit 1
          fi

          # FFmpeg অপ্টিমাইজেশন: পাবলিক ইউজারদের জন্য হাই-বিটরেট ও বাফার
          timeout 600s ffmpeg -re -i "$VIDEO_URL" \
          -c:v libx264 -preset superfast -tune zerolatency -b:v 4500k -maxrate 5000k -bufsize 10000k \
          -pix_fmt yuv420p -s 1280x720 -g 60 -r 30 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ github.event.client_payload.stream_key }}"
          
