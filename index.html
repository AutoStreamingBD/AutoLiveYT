        /* Floating Animation */

            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 4s ease-in-out infinite; }

        .loader {
            border-top-color: var(--primary-cyan);

        @keyframes spinner {

<body class="min-h-screen flex flex-col items-center px-4 py-8">

    <div id="overlay" class="fixed inset-0 bg-black/95 backdrop-blur-3xl flex flex-col items-center justify-center z-50 hidden px-6">

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBSS52Pp0z1rYIWzb0A-V7Yx_Ko4T7EFp8", 
            authDomain: "autostreamingbd.firebaseapp.com", 
            projectId: "autostreamingbd", 
            storageBucket: "autostreamingbd.firebasestorage.app", 
            messagingSenderId: "604115747119", 
            appId: "1:604115747119:web:40ffdab256239d3d5f61da" 
        };
        const GITHUB_TOKEN = "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"; 
        const REPO_OWNER = "AutoStreamingBD";
        const REPO_NAME = "AutoLiveYT";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Realtime Engine
        db.collection("system").doc("live_slots").onSnapshot((doc) => {
            const data = doc.data() || {};
            for (let i = 1; i <= 5; i++) {
                const el = document.getElementById(`s${i}-status`), card = document.getElementById(`slot${i}-card`);
                if (data[`slot${i}`] === "Available") {
                    el.innerText = "ONLINE"; el.className = "text-cyan-400 font-bold text-xs futuristic"; card.classList.remove('slot-booked');
                } else {
                    card.classList.add('slot-booked');
                    updateTimer(i, data[`slot${i}_time`], el);
                }
            }
        });

        function updateTimer(n, endTime, el) {
            const x = setInterval(() => {
                const dist = endTime - Date.now();
                if (dist <= 0) { 
                    clearInterval(x); 
                    db.collection("system").doc("live_slots").update({ [`slot${n}`]: "Available" }); 
                    return; 
                }
                const m = Math.floor(dist/60000), s = Math.floor((dist%60000)/1000);
                el.innerText = `${m}:${s < 10 ? '0' : ''}${s} LEFT`;
                el.className = "text-red-500 font-bold text-xs futuristic animate-pulse";
            }, 1000);
        }

        async function mainAction() {
            const key = document.getElementById('streamKey').value, vid = document.getElementById('videoId').value;
            if(!key || !vid) return alert("Please enter both Stream Key and Video ID.");

            try {
                const ipCheck = await fetch('https://ipapi.co/json/').then(r => r.json());
                if(ipCheck.proxy) return alert("Security Warning: VPN/Proxy usage is restricted.");

                const overlay = document.getElementById('overlay');
                overlay.classList.remove('hidden');
                document.getElementById('overlayMsg').innerHTML = "SYSTEM PROTOCOL:<br><span class='text-white text-lg mt-4 block font-light'>Do not use copyrighted material. Legal ownership is required.</span>";

                setTimeout(async () => {
                    overlay.classList.add('hidden');
                    const snap = await db.collection("system").doc("live_slots").get(), data = snap.data();
                    let slotIdx = null;
                    for(let i=1; i<=5; i++) if(data[`slot${i}`] === "Available") { slotIdx = i; break; }
                    
                    if(!slotIdx) return alert("System Overload: All slots are currently occupied.");

                    // GitHub API Dispatch
                    await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                        method: 'POST',
                        headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' },
                        body: JSON.stringify({ event_type: "start-live", client_payload: { stream_key: key, video_id: vid } })
                    });

                    const endAt = Date.now() + 600000;
                    await db.collection("system").doc("live_slots").update({ [`slot${slotIdx}`]: "Booked", [`slot${slotIdx}_time`]: endAt });
                    
                    setTimeout(() => { 
                        alert("NOTICE: Trial period ending soon. To secure 24/7 uptime, contact Ahyan Creations LTD via WhatsApp +8801604444716."); 
                    }, 540000);
                }, 4000);
            } catch(e) { alert("Network Connection Error."); }
        }
    </script>
